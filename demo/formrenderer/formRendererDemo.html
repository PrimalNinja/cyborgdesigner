<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Renderer Demo</title>
    <link href="3p/bootstrap.min.css" rel="stylesheet">
    <script src="3p/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="formRenderer.css">
</head>
<body>
    <div class="container-fluid mt-4">
        <h1>Form Renderer Demo</h1>
        <p>Select a form to render:</p>
        
        <div class="btn-group mb-3" role="group">
            <button type="button" class="btn btn-primary" onclick="loadConnoteForm()">Connote Form</button>
            <button type="button" class="btn btn-primary" onclick="loadBookingForm()">Booking Form</button>
            <button type="button" class="btn btn-primary" onclick="loadTrackingForm()">Tracking Form</button>
        </div>
        
        <div class="btn-group mb-3 ml-2" role="group">
            <button type="button" class="btn btn-success" onclick="validateForm()">Validate</button>
            <button type="button" class="btn btn-info" onclick="getFormData()">Get Data</button>
            <button type="button" class="btn btn-warning" onclick="populateTestData()">Populate Test Data</button>
        </div>
        
        <div id="demo-handler" class="gscr-formrenderer-handler">
            <div class="gscr-formrenderer-target"></div>
        </div>
        
        <div id="output-panel" class="mt-4" style="display:none;">
            <h4>Output:</h4>
            <pre id="output-content" class="border p-3 bg-light"></pre>
        </div>
    </div>
    
    <script src="formRenderer.js"></script>
    <script src="formData.js"></script>
    <script>
        // Mock OS object for standalone demo
        // CyborgDesktop pattern: caller provides # and . prefixes
        var os = {
            element: function(strScope_a, strClass_a) {
                if (arguments.length === 1) {
                    // Single parameter: os.element(this) or os.element('#id')
                    return $(strScope_a);
                } else {
                    // Two parameters: os.element('#formID', '.classname')
                    // Caller provides prefixes - we just pass through
                    return $(strClass_a, strScope_a);
                }
            }
        };
        
        var currentRenderer = null;
        
        function loadConnoteForm() {
            currentRenderer = new formRenderer(os, 'demo-handler', {
                layoutSections: objFormConnote,
				target: 'gscr-formrenderer-target',
                readonly: false,
                onChange: function(dirty) {
                    console.log('Form dirty:', dirty);
                }
            });
        }
        
        function loadBookingForm() {
            currentRenderer = new formRenderer(os, 'demo-handler', {
                layoutSections: objFormBooking,
				target: 'gscr-formrenderer-target',
                readonly: false,
                onChange: function(dirty) {
                    console.log('Form dirty:', dirty);
                }
            });
        }
        
        function loadTrackingForm() {
            currentRenderer = new formRenderer(os, 'demo-handler', {
                layoutSections: objFormTracking,
				target: 'gscr-formrenderer-target',
                readonly: false,
                onChange: function(dirty) {
                    console.log('Form dirty:', dirty);
                }
            });
        }
        
        function validateForm() {
            if (!currentRenderer) {
                alert('Please load a form first');
                return;
            }
            
            var errors = currentRenderer.validate();
            
            if (errors.length > 0) {
                showOutput('Validation Errors:\n\n' + errors.join('\n'));
            } else {
                showOutput('Validation passed! ✓');
            }
        }
        
        function getFormData() {
            if (!currentRenderer) {
                alert('Please load a form first');
                return;
            }
            
            var data = currentRenderer.getData();
            showOutput(JSON.stringify(data, null, 2));
        }
        
        function populateTestData() {
            if (!currentRenderer) {
                alert('Please load a form first');
                return;
            }
            
            var testData = {
                'CONNOTENUMBER': 'CN-2025-001',
                'CONNOTEDATE': '2025-01-15',
                'CUSTOMERREFERENCE': 'REF-12345',
                'CARRIERCODE': 'SENDER',
                'NUMBEROFPIECES': '5',
                'TOTALWEIGHT': '125.5',
                'ITEMDESCRIPTION': 'Computer equipment and accessories',
                'ISDANGEROUS': 'no',
                'STATUS': 'CREATED'
            };
            
            currentRenderer.setData(testData);
        }
        
        function showOutput(text) {
            document.getElementById('output-content').textContent = text;
            document.getElementById('output-panel').style.display = 'block';
        }
        
        // Load default form
        window.onload = function() {
            loadConnoteForm();
        };
    </script>
</body>
</html>
