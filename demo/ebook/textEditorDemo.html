<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Manuscript Editor</title>
    <link href="3p/bootstrap.min.css" rel="stylesheet">
    <link href="textEditor.css" rel="stylesheet">
    <link href="cyborgWiki.css" rel="stylesheet">
    <link href="textEditorDemo.css" rel="stylesheet">
</head>
<body>

<div id="app-header">
    <span id="app-title">Manuscript</span>
    <input id="input-title"  type="text" class="form-control form-control-sm" placeholder="Book title" />
    <input id="input-author" type="text" class="form-control form-control-sm" placeholder="Author name" />
    <div class="hdr-spacer"></div>
    <button class="btn btn-sm btn-outline-secondary" id="btn-structure">&#9685; Structure</button>
</div>

<div id="app-body">
    <div id="ms-editor"></div>

    <div id="struct-panel">
        <div id="struct-header">Structure <span id="struct-badge"></span></div>
        <div id="struct-list"><div style="padding:12px; font-size:12px; color:#adb5bd;">Click Structure to scan headings.</div></div>
    </div>
</div>

<div id="toast"></div>

<script src="3p/jquery-3.7.1.min.js"></script>
<script src="3p/jszip.min.js"></script>
<script src="textEditor.js"></script>
<script src="cyborgWiki.js"></script>
<script src="textEditorDemo.js"></script>
</body>
